name: PR Review Summary
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  summary:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.24.x
          cache-dependency-path: "**/go.sum"

      - name: Run tests and collect coverage
        id: tests
        run: |
          set +e
          go test -v ./... 2>&1 | tee test-output.txt
          TEST_EXIT=$?
          go test -coverprofile=coverage.txt -covermode=atomic ./... 2>/dev/null
          TOTAL=$(go tool cover -func=coverage.txt 2>/dev/null | grep "^total:" | awk '{print $3}' | tr -d '%')
          echo "coverage=${TOTAL:-0}" >> "$GITHUB_OUTPUT"
          if [ $TEST_EXIT -eq 0 ]; then
            echo "test_status=pass" >> "$GITHUB_OUTPUT"
          else
            echo "test_status=fail" >> "$GITHUB_OUTPUT"
          fi
          PASS_COUNT=$(grep -c "^--- PASS" test-output.txt 2>/dev/null) || PASS_COUNT=0
          FAIL_COUNT=$(grep -c "^--- FAIL" test-output.txt 2>/dev/null) || FAIL_COUNT=0
          echo "pass_count=${PASS_COUNT}" >> "$GITHUB_OUTPUT"
          echo "fail_count=${FAIL_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Run linter
        id: lint
        run: |
          set +e
          go vet ./... 2>&1 | tee lint-output.txt
          LINT_EXIT=$?
          if [ $LINT_EXIT -eq 0 ]; then
            echo "lint_status=pass" >> "$GITHUB_OUTPUT"
          else
            echo "lint_status=fail" >> "$GITHUB_OUTPUT"
          fi
          LINT_ISSUES=$(wc -l < lint-output.txt | tr -d ' ')
          echo "lint_issues=${LINT_ISSUES}" >> "$GITHUB_OUTPUT"

      - name: Check go mod tidy
        id: modtidy
        run: |
          set +e
          go mod tidy
          DIFF=$(git diff --name-only go.mod go.sum)
          if [ -z "$DIFF" ]; then
            echo "mod_status=pass" >> "$GITHUB_OUTPUT"
          else
            echo "mod_status=fail" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect PR stats
        id: stats
        run: |
          FILE_COUNT=$(git diff --name-only origin/master...HEAD | wc -l | tr -d ' ')
          ADDITIONS=$(git diff --stat origin/master...HEAD | tail -1 | awk '{print $4}')
          DELETIONS=$(git diff --stat origin/master...HEAD | tail -1 | awk '{print $6}')
          echo "files=${FILE_COUNT}" >> "$GITHUB_OUTPUT"
          echo "additions=${ADDITIONS:-0}" >> "$GITHUB_OUTPUT"
          echo "deletions=${DELETIONS:-0}" >> "$GITHUB_OUTPUT"

      - name: Post summary comment
        uses: actions/github-script@v7
        env:
          TEST_STATUS: ${{ steps.tests.outputs.test_status }}
          COVERAGE: ${{ steps.tests.outputs.coverage }}
          PASS_COUNT: ${{ steps.tests.outputs.pass_count }}
          FAIL_COUNT: ${{ steps.tests.outputs.fail_count }}
          LINT_STATUS: ${{ steps.lint.outputs.lint_status }}
          LINT_ISSUES: ${{ steps.lint.outputs.lint_issues }}
          MOD_STATUS: ${{ steps.modtidy.outputs.mod_status }}
          FILE_COUNT: ${{ steps.stats.outputs.files }}
          ADDITIONS: ${{ steps.stats.outputs.additions }}
          DELETIONS: ${{ steps.stats.outputs.deletions }}
        with:
          script: |
            const testIcon = process.env.TEST_STATUS === 'pass' ? ':white_check_mark:' : ':x:';
            const lintIcon = process.env.LINT_STATUS === 'pass' ? ':white_check_mark:' : ':x:';
            const modIcon = process.env.MOD_STATUS === 'pass' ? ':white_check_mark:' : ':x:';

            const coverageNum = parseFloat(process.env.COVERAGE);
            let coverageIcon = ':white_check_mark:';
            if (coverageNum < 50) coverageIcon = ':x:';
            else if (coverageNum < 70) coverageIcon = ':warning:';

            const body = `## CI Review Summary

            | Check | Status | Details |
            |-------|--------|---------|
            | Tests | ${testIcon} ${process.env.TEST_STATUS} | ${process.env.PASS_COUNT} passed, ${process.env.FAIL_COUNT} failed |
            | Coverage | ${coverageIcon} ${process.env.COVERAGE}% | Threshold: 50% |
            | go vet | ${lintIcon} ${process.env.LINT_STATUS} | ${process.env.LINT_ISSUES} issues |
            | go mod tidy | ${modIcon} ${process.env.MOD_STATUS} | |

            **PR Stats:** ${process.env.FILE_COUNT} files changed, +${process.env.ADDITIONS} -${process.env.DELETIONS}

            ---
            *Auto-generated by CI*`.replace(/^            /gm, '');

            // Find and update existing comment or create new one
            const marker = '## CI Review Summary';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
