networks:
  a-mgmt:
    internal: true
  gobmp-ceos-1:
    ipam:
      config:
      - subnet: 10.1.1.0/24

services:
  gobmp:
    image: localhost/gobmp:cicd
    expose:
      - 5000
    entrypoint:
      [
        "/gobmp",
        "--source-port=5000",
        "--intercept=false",
        "--split-af=true",
        "--v=9",
        "--kafka-server=kafka-1:9091,kafka-2:9092,kafka-3:9093,kafka-4:9094"
      ]
    cap_add:
    - NET_ADMIN
    networks:
      gobmp-ceos-1:
        ipv4_address: 10.1.1.2
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
      - kafka-4

  zookeeper:
    image: zookeeper:3.7.0
    restart: always
    expose:
      - 2181
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      gobmp-ceos-1:
        ipv4_address: 10.1.1.5
    volumes:
      - ./zookeeper_hc.sh:/tmp/hc.sh
    healthcheck:
      test: [ "CMD-SHELL", "/tmp/hc.sh" ]
      interval: 2s
      timeout: 5s
      retries: 5
      start_period: 20s

  kafka-1:
    image: confluentinc/cp-kafka:7.3.1
    restart: always
    depends_on:
      - zookeeper
    ports:
      - 9091:9091
    expose:
      - 9091
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      ZOOKEEPER: "zookeeper:2181"
      KAFKA_TOPICS: "gobmp.parsed.peer:4:4:delete gobmp.parsed.unicast_prefix:6:4:delete gobmp.parsed.unicast_prefix_v4:6:4:delete gobmp.parsed.unicast_prefix_v6:6:4:delete gobmp.parsed.ls_node:4:4:delete gobmp.parsed.ls_link:4:4:delete gobmp.parsed.l3vpn:4:4:delete gobmp.parsed.l3vpn_v4:4:4:delete gobmp.parsed.l3vpn_v6:4:4:delete gobmp.parsed.sr_policy:4:4:delete gobmp.parsed.sr_policy_v4:4:4:delete gobmp.parsed.sr_policy_v6:4:4:delete gobmp.parsed.flowspec:4:4:delete gobmp.parsed.flowspec_v4:4:4:delete gobmp.parsed.flowspec_v6:4:4:delete gobmp.parsed.ls_prefix:4:4:delete gobmp.parsed.ls_srv6_sid:4:4:delete gobmp.parsed.evpn:4:4:delete gobmp.parsed.statistics:4:4:delete"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-1:9091"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9091"
      BOOTSTRAP_SERVERS: "kafka-1:9091,kafka-2:9092,kafka-3:9093,kafka-4:9094"
    networks:
      gobmp-ceos-1:
        ipv4_address: 10.1.1.6
    healthcheck:
      test: ps augwwx | egrep [S]upportedKafka
      interval: 2s
      timeout: 5s
      retries: 5
      start_period: 20s

  kafka-2:
    image: confluentinc/cp-kafka:7.3.1
    restart: always
    depends_on:
      - zookeeper
    ports:
      - 9092:9092
    expose:
      - 9092
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      ZOOKEEPER: "zookeeper:2181"
      KAFKA_TOPICS: "gobmp.parsed.peer:4:4:delete gobmp.parsed.unicast_prefix:6:4:delete gobmp.parsed.unicast_prefix_v4:6:4:delete gobmp.parsed.unicast_prefix_v6:6:4:delete gobmp.parsed.ls_node:4:4:delete gobmp.parsed.ls_link:4:4:delete gobmp.parsed.l3vpn:4:4:delete gobmp.parsed.l3vpn_v4:4:4:delete gobmp.parsed.l3vpn_v6:4:4:delete gobmp.parsed.sr_policy:4:4:delete gobmp.parsed.sr_policy_v4:4:4:delete gobmp.parsed.sr_policy_v6:4:4:delete gobmp.parsed.flowspec:4:4:delete gobmp.parsed.flowspec_v4:4:4:delete gobmp.parsed.flowspec_v6:4:4:delete gobmp.parsed.ls_prefix:4:4:delete gobmp.parsed.ls_srv6_sid:4:4:delete gobmp.parsed.evpn:4:4:delete gobmp.parsed.statistics:4:4:delete"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-2:9092"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092"
      BOOTSTRAP_SERVERS: "kafka-1:9091,kafka-2:9092,kafka-3:9093,kafka-4:9094"
    networks:
      gobmp-ceos-1:
        ipv4_address: 10.1.1.7
    healthcheck:
      test: ps augwwx | egrep [S]upportedKafka
      interval: 2s
      timeout: 5s
      retries: 5
      start_period: 20s

  kafka-3:
    image: confluentinc/cp-kafka:7.3.1
    restart: always
    depends_on:
      - zookeeper
    ports:
      - 9093:9093
    expose:
      - 9093
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      ZOOKEEPER: "zookeeper:2181"
      KAFKA_TOPICS: "gobmp.parsed.peer:4:4:delete gobmp.parsed.unicast_prefix:6:4:delete gobmp.parsed.unicast_prefix_v4:6:4:delete gobmp.parsed.unicast_prefix_v6:6:4:delete gobmp.parsed.ls_node:4:4:delete gobmp.parsed.ls_link:4:4:delete gobmp.parsed.l3vpn:4:4:delete gobmp.parsed.l3vpn_v4:4:4:delete gobmp.parsed.l3vpn_v6:4:4:delete gobmp.parsed.sr_policy:4:4:delete gobmp.parsed.sr_policy_v4:4:4:delete gobmp.parsed.sr_policy_v6:4:4:delete gobmp.parsed.flowspec:4:4:delete gobmp.parsed.flowspec_v4:4:4:delete gobmp.parsed.flowspec_v6:4:4:delete gobmp.parsed.ls_prefix:4:4:delete gobmp.parsed.ls_srv6_sid:4:4:delete gobmp.parsed.evpn:4:4:delete gobmp.parsed.statistics:4:4:delete"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-3:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9093"
      BOOTSTRAP_SERVERS: "kafka-1:9091,kafka-2:9092,kafka-3:9093,kafka-4:9094"
    networks:
      gobmp-ceos-1:
        ipv4_address: 10.1.1.8
    healthcheck:
      test: ps augwwx | egrep [S]upportedKafka
      interval: 2s
      timeout: 5s
      retries: 5
      start_period: 20s

  kafka-4:
    image: confluentinc/cp-kafka:7.3.1
    restart: always
    depends_on:
      - zookeeper
    ports:
      - 9094:9094
    expose:
      - 9094
    environment:
      KAFKA_BROKER_ID: 4
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      ZOOKEEPER: "zookeeper:2181"
      KAFKA_TOPICS: "gobmp.parsed.peer:4:4:delete gobmp.parsed.unicast_prefix:6:4:delete gobmp.parsed.unicast_prefix_v4:6:4:delete gobmp.parsed.unicast_prefix_v6:6:4:delete gobmp.parsed.ls_node:4:4:delete gobmp.parsed.ls_link:4:4:delete gobmp.parsed.l3vpn:4:4:delete gobmp.parsed.l3vpn_v4:4:4:delete gobmp.parsed.l3vpn_v6:4:4:delete gobmp.parsed.sr_policy:4:4:delete gobmp.parsed.sr_policy_v4:4:4:delete gobmp.parsed.sr_policy_v6:4:4:delete gobmp.parsed.flowspec:4:4:delete gobmp.parsed.flowspec_v4:4:4:delete gobmp.parsed.flowspec_v6:4:4:delete gobmp.parsed.ls_prefix:4:4:delete gobmp.parsed.ls_srv6_sid:4:4:delete gobmp.parsed.evpn:4:4:delete gobmp.parsed.statistics:4:4:delete"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-4:9094"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9094"
      BOOTSTRAP_SERVERS: "kafka-1:9091,kafka-2:9092,kafka-3:9093,kafka-4:9094"
    networks:
      gobmp-ceos-1:
        ipv4_address: 10.1.1.9
    healthcheck:
      test: ps augwwx | egrep [S]upportedKafka
      interval: 2s
      timeout: 5s
      retries: 5
      start_period: 20s

  ceos-1:
    cap_add:
    - NET_ADMIN
    - SYS_ADMIN
    - SYS_RESOURCE
    container_name: ceos-1
    environment:
      CEOS: 1
      EOS_PLATFORM: ceoslab
      container: docker
      MGMT_INTF: eth0
      INTFTYPE: eth
      ETBA: 1
      SKIP_ZEROTOUCH_BARRIER_IN_SYSDBINIT: 1
    image: sbezverk/ceos-lab-4.35.2f:cicd
    networks:
      a-mgmt: null
      gobmp-ceos-1:
        ipv4_address: 10.1.1.3
    stdin_open: true
    tty: true
    volumes:
    - source: ./ceos-1_startup.cfg
      target: /mnt/flash/startup-config
      type: bind
    - ceos-1:/mnt/flash/

  ceos-2:
    cap_add:
    - NET_ADMIN
    - SYS_ADMIN
    - SYS_RESOURCE
    container_name: ceos-2
    environment:
      CEOS: 1
      EOS_PLATFORM: ceoslab
      container: docker
      MGMT_INTF: eth0
      INTFTYPE: eth
      ETBA: 1
      SKIP_ZEROTOUCH_BARRIER_IN_SYSDBINIT: 1
    image: sbezverk/ceos-lab-4.35.2f:cicd
    networks:
      a-mgmt: null
      gobmp-ceos-1:
        ipv4_address: 10.1.1.10
    stdin_open: true
    tty: true
    volumes:
    - source: ./ceos-2_startup.cfg
      target: /mnt/flash/startup-config
      type: bind
    - ceos-2:/mnt/flash/

volumes:
  ceos-1:
    name: ceos-1
  ceos-2:
    name: ceos-2
