frr version 8.4.1
frr defaults traditional
hostname frr-2
no ipv6 forwarding
!
! Static black-hole routes that frr-2 will advertise to frr-1 via BGP.
ip route 10.10.2.0/24 blackhole
ip route 10.10.22.0/24 blackhole
!
router bgp 65002
 bgp router-id 192.168.100.12
 bgp log-neighbor-changes
 no bgp ebgp-requires-policy
 neighbor 192.168.100.11 remote-as 65001
 !
 address-family ipv4 unicast
  redistribute connected
  redistribute static
  neighbor 192.168.100.11 activate
 exit-address-family
!
