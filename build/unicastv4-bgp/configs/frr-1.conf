frr version 8.4.1
frr defaults traditional
hostname frr-1
no ipv6 forwarding
!
! Loopback host route — mirrors xrd-1's Loopback0 1.1.1.1/32.
! Redistributed into BGP via "redistribute connected".
ip route 1.1.1.1/32 lo
!
! Static black-hole routes that frr-1 will advertise to frr-2 via BGP.
ip route 10.10.1.0/24 blackhole
ip route 10.10.11.0/24 blackhole
!
router bgp 65001
 bgp router-id 10.1.1.3
 bgp log-neighbor-changes
 no bgp ebgp-requires-policy
 neighbor 192.168.100.12 remote-as 65002
 !
 address-family ipv4 unicast
  redistribute connected
  neighbor 192.168.100.12 activate
 exit-address-family
 !
 ! BMP targets block.
 ! bmp listener makes frr-1 accept inbound TCP connections from gobmp
 ! (gobmp active mode dials frr-1:57000).  Once connected, frr-1 streams
 ! BMP Initiation, PeerUp, and RouteMonitoring messages to gobmp.
 bmp targets gobmp
  bmp listener 0.0.0.0 port 57000
  bmp monitor ipv4 unicast post-policy
  bmp stats interval 60000
 exit
!
