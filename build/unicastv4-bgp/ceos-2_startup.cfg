hostname ceos-2
!
username admin privilege 15 role network-admin secret admin
!
interface Loopback0
   ip address 2.2.2.2/32
   ipv6 enable
   ipv6 address 2001:db8:2::2/128
!
interface Ethernet1
   no switchport
   ip address 10.1.1.10/24
   ipv6 enable
   ipv6 address 2001:db8:10:1::10/64
   no shutdown
!
ip routing
ipv6 unicast-routing
!
router bgp 200
   router-id 2.2.2.2
   bgp log-neighbor-changes
   neighbor 10.1.1.3 remote-as 100
   neighbor 2001:db8:10:1::3 remote-as 100
   !
   address-family ipv4
      neighbor 10.1.1.3 activate
      redistribute connected
   !
   address-family ipv6
      neighbor 2001:db8:10:1::3 activate
      redistribute connected
!
end
