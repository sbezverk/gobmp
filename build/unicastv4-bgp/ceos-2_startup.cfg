! ceos-2: BGP peer (AS 200) for ceos-1 (AS 100)
!
! Data IPs are on Management0 (not Ethernet1) — see ceos-1_startup.cfg
! for explanation.
!
! Route-map REDISTRIBUTE_CONNECTED_V4 filters redistributed prefixes to
! only 2.2.2.2/32 and 10.1.1.0/24, ensuring predictable validator data.
!
hostname ceos-2
!
username admin privilege 15 role network-admin secret admin
!
interface Loopback0
   ip address 2.2.2.2/32
   ipv6 enable
   ipv6 address 2001:db8:2::2/128
!
interface Management0
   ip address 10.1.1.10/24
   ipv6 enable
   ipv6 address 2001:db8:10:1::10/64
   no shutdown
!
ip routing
ipv6 unicast-routing
!
ip prefix-list CONNECTED_V4 seq 10 permit 2.2.2.2/32
ip prefix-list CONNECTED_V4 seq 20 permit 10.1.1.0/24
!
route-map REDISTRIBUTE_CONNECTED_V4 permit 10
   match ip address prefix-list CONNECTED_V4
!
router bgp 200
   router-id 2.2.2.2
   bgp log-neighbor-changes
   neighbor 10.1.1.3 remote-as 100
   !
   address-family ipv4
      neighbor 10.1.1.3 activate
      redistribute connected route-map REDISTRIBUTE_CONNECTED_V4
!
end
