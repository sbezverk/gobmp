version: "3.9"

networks:
  mgmt:
    driver_opts:
      com.docker.network.container_iface_prefix: srl-1
    ipam:
      config:
        - subnet: 172.30.0.0/24

  gobmp-srl-1:
    driver_opts:
      com.docker.network.container_iface_prefix: srl-2
    ipam:
      config:
        - subnet: 10.1.1.0/24

  srl-1-e1-2-srl-2-e1-1:
    driver_opts:
      com.docker.network.container_iface_prefix: srl-0
      com.docker.network.driver.mtu: 9000
    internal: true
    name: srl-1-e1-2-srl-2-e1-1
    ipam:
      config:
        - subnet: 192.168.100.0/24

services:
  zoo:
    image: sbezverk/zookeeper:cicd
    hostname: zoo
    container_name: zoo
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SERVER_ID: 1
      ZOOKEEPER_SERVERS: zoo:2888:3888
      ALLOW_ANONYMOUS_LOGIN: "yes"
    networks:
      gobmp-srl-1:
        ipv4_address: 10.1.1.5

  kafka:
    image: sbezverk/kafka:cicd
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      - KAFKA_ENABLE_KRAFT=no
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_ADVERTISED_HOST_NAME=kafka
      - KAFKA_CFG_ZOOKEEPER_CONNECT=10.1.1.5:2181
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - BITNAMI_DEBUG=true
    depends_on:
      - zoo
    networks:
      gobmp-srl-1:
        ipv4_address: 10.1.1.4

  gobmp:
    image: localhost/gobmp:cicd
    hostname: gobmp
    container_name: gobmp
    command:
      --v=9
      --kafka-server=10.1.1.4:9092
    ports:
      - "5000:5000"
    cap_add:
      - NET_ADMIN
    networks:
      gobmp-srl-1:
        ipv4_address: 10.1.1.2
    stdin_open: true
    tty: true
    depends_on:
      - kafka
    volumes:
      - "/tmp:/tmp"

  srl-1:
    image: ghcr.io/nokia/srlinux:25.10.2
    container_name: srl-1
    hostname: srl-1
    privileged: true
    stdin_open: true
    tty: true
    networks:
      mgmt: {}
      gobmp-srl-1:
        ipv4_address: 10.1.1.3
      srl-1-e1-2-srl-2-e1-1:
        ipv4_address: 192.168.100.1
    volumes:
      - ./configs/srl-1.cli:/configs/startup.cli:ro
      - srl-1:/etc/opt/srlinux
    command: >
      bash -lc '
        /opt/srlinux/bin/sr_linux &
        for i in $(seq 1 60); do
          if sr_cli -c "show version" >/dev/null 2>&1; then
            break
          fi
          sleep 2
        done
        sr_cli < /configs/startup.cli
        wait
      '
    depends_on:
      - gobmp

  srl-2:
    image: ghcr.io/nokia/srlinux:25.10.2
    container_name: srl-2
    hostname: srl-2
    privileged: true
    stdin_open: true
    tty: true
    networks:
      mgmt: {}
      srl-1-e1-2-srl-2-e1-1:
        ipv4_address: 192.168.100.2
    volumes:
      - ./configs/srl-2.cli:/configs/startup.cli:ro
      - srl-2:/etc/opt/srlinux
    command: >
      bash -lc '
        /opt/srlinux/bin/sr_linux &
        for i in $(seq 1 60); do
          if sr_cli -c "show version" >/dev/null 2>&1; then
            break
          fi
          sleep 2
        done
        sr_cli < /configs/startup.cli
        wait
      '

volumes:
  srl-1:
    name: srl-1
  srl-2:
    name: srl-2