networks:
  gobmp-frr-1:
    ipam:
      config:
        - subnet: 10.1.1.0/24

  frr-1-eth1-frr-2-eth0:
    driver_opts:
      com.docker.network.driver.mtu: 9000
    internal: true
    name: frr-1-eth1-frr-2-eth0
    ipam:
      config:
        - subnet: 192.168.100.0/24

services:
  zoo:
    image: sbezverk/zookeeper:cicd
    platform: linux/amd64
    hostname: zoo
    container_name: zoo
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SERVER_ID: 1
      ZOOKEEPER_SERVERS: zoo:2888:3888
      ALLOW_ANONYMOUS_LOGIN: "yes"
    networks:
      gobmp-frr-1:
        ipv4_address: 10.1.1.5

  kafka:
    image: sbezverk/kafka:cicd
    platform: linux/amd64
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      - KAFKA_ENABLE_KRAFT=no
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_ZOOKEEPER_CONNECT=10.1.1.5:2181
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - BITNAMI_DEBUG=true
    depends_on:
      - zoo
    networks:
      gobmp-frr-1:
        ipv4_address: 10.1.1.4

  gobmp:
    image: localhost/gobmp:cicd
    hostname: gobmp
    container_name: gobmp
    command:
      --v=9
      --config=/etc/gobmp/config.yaml
    cap_add:
      - NET_ADMIN
    networks:
      gobmp-frr-1:
        ipv4_address: 10.1.1.2
    stdin_open: true
    tty: true
    depends_on:
      - kafka
    volumes:
      - "/tmp:/tmp"
      - ./configs/gobmp.yaml:/etc/gobmp/config.yaml:ro

  frr-1:
    # FRRouting acts as BGP speaker (AS 65001) and BMP server.
    # bgpd is loaded with the -M bmp module and configured with:
    #   bmp listener 0.0.0.0 port 57000
    # gobmp (active mode) dials frr-1:57000 and receives BMP monitoring data.
    image: sbezverk/frr_v8.4.1:cicd
    container_name: frr-1
    hostname: frr-1
    privileged: true
    stdin_open: true
    tty: true
    networks:
      gobmp-frr-1:
        ipv4_address: 10.1.1.3
      frr-1-eth1-frr-2-eth0:
        ipv4_address: 192.168.100.11
    volumes:
      - ./configs/frr-1.conf:/etc/frr/frr.conf:ro
      - ./configs/frr-daemons:/etc/frr/daemons:ro
    depends_on:
      - gobmp

  frr-2:
    # FRRouting acts as BGP speaker (AS 65002), peers with frr-1 over the
    # internal 192.168.100.0/24 link.  No BMP configuration required.
    image: sbezverk/frr_v8.4.1:cicd
    container_name: frr-2
    hostname: frr-2
    privileged: true
    stdin_open: true
    tty: true
    networks:
      frr-1-eth1-frr-2-eth0:
        ipv4_address: 192.168.100.12
    volumes:
      - ./configs/frr-2.conf:/etc/frr/frr.conf:ro
      - ./configs/frr-daemons:/etc/frr/daemons:ro
    depends_on:
      - gobmp
