! ceos-1: BMP speaker (AS 100) peering with ceos-2 (AS 200)
!
! Data IPs are on Management0 (not Ethernet1) because Docker Compose
! assigns networks to eth interfaces non-deterministically. With a single
! network, eth0 is always gobmp-ceos-1, and Management0 maps to eth0.
!
hostname ceos-1
!
username admin privilege 15 role network-admin secret admin
!
interface Loopback0
   ip address 1.1.1.1/32
   ipv6 enable
   ipv6 address 2001:db8:1::1/128
!
interface Management0
   ip address 10.1.1.3/24
   ipv6 enable
   ipv6 address 2001:db8:10:1::3/64
   no shutdown
!
ip routing
ipv6 unicast-routing
!
router bgp 100
   router-id 1.1.1.1
   bgp log-neighbor-changes
   bgp monitoring
   neighbor 10.1.1.10 remote-as 200
   !
   address-family ipv4
      neighbor 10.1.1.10 activate
      redistribute connected
   !
   monitoring received routes address-family ipv4 unicast
   !
   monitoring station gobmp
      connection address 10.1.1.2
      connection mode active port 5000
      export-policy received routes additional-paths
      ! pre-policy only: do NOT add post-policy. Both share the same
      ! validator key (prefix_prefixlen_peerip_nexthop) but post-policy
      ! includes local_pref=100 which mismatches test data (local_pref=0).
      export-policy received routes pre-policy
      no shutdown
!
end
