hostname ceos-1
!
username admin privilege 15 role network-admin secret admin
!
interface Loopback0
   ip address 1.1.1.1/32
   ipv6 enable
   ipv6 address 2001:db8:1::1/128
!
interface Ethernet1
   no switchport
   ip address 10.1.1.3/24
   ipv6 enable
   ipv6 address 2001:db8:10:1::3/64
   no shutdown
!
ip routing
ipv6 unicast-routing
!
router bgp 100
   router-id 1.1.1.1
   bgp log-neighbor-changes
   bgp monitoring
   neighbor 10.1.1.10 remote-as 200
   neighbor 2001:db8:10:1::10 remote-as 200
   !
   address-family ipv4
      neighbor 10.1.1.10 activate
      redistribute connected
   !
   address-family ipv6
      neighbor 2001:db8:10:1::10 activate
      redistribute connected
   !
   monitoring received routes address-family ipv4 unicast
   monitoring received routes address-family ipv6 unicast
   !
   monitoring station gobmp
      connection address 10.1.1.2
      connection mode active port 5000
      export-policy received routes additional-paths
      export-policy received routes pre-policy post-policy
      no shutdown
!
end
