hostname ceos-1
!
username admin privilege 15 role network-admin secret admin
!
interface Loopback0
   ip address 1.1.1.1/32
!
interface Ethernet1
   no switchport
   ip address 10.1.1.3/24
   no shutdown
!
ip routing
!
router bgp 100
   router-id 1.1.1.1
   bgp log-neighbor-changes
   neighbor 10.1.1.10 remote-as 200
   !
   address-family ipv4
      neighbor 10.1.1.10 activate
      redistribute connected
   !
   monitoring station gobmp
      connection address 10.1.1.2
      connection mode active port 5000
      export-policy received routes additional-paths
      export-policy received routes pre-policy post-policy
      export-policy bgp rib bestpaths
      no shutdown
!
end
